<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>7TV Emotes - Panel</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/panel.css" />
    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <div class="extension-container">
      <a href="https://7tv.app" target="_blank" class="header">
        <img src="img/logo.svg" class="header-logo" />
        <span class="emote-count"></span>
      </a>
      <div class="controls-bar">
        <input type="text" class="search-input" placeholder="Search emotes..." />
        <div class="controls-row">
          <select class="sort-select">
            <option value="default">Order added</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="newest">Newest first</option>
          </select>
          <button class="anim-toggle" data-active="false">GIF only</button>
        </div>
      </div>
      <div class="emotes"></div>
    </div>
  </body>
</html>
